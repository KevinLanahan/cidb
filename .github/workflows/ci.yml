name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Download dependencies
        run: go mod download

      - name: Vet
        run: go vet ./...
        env:
          CGO_ENABLED: "0"

      - name: Test
        run: go test ./...
        env:
          CGO_ENABLED: "0"

      - name: Build
        run: go build -o cidb .
        env:
          CGO_ENABLED: "0"

      - name: Optional lint check
        continue-on-error: true
        run: echo "this would be a linter that might fail" && exit 1

      - name: Notify on failure
        if: failure()
        run: echo "Build failed — check the steps above"

      - name: Always log completion
        if: always()
        run: echo "Pipeline finished"

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v4
      - name: Simulate release
        run: echo "Would publish release here"

  deploy-prod:
    needs: build
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Deploy
        run: echo "Deploying to production"
