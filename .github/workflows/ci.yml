name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Download dependencies
        run: go mod download

      - name: Vet
        run: go vet ./...
        env:
          CGO_ENABLED: "0"

      - name: Test
        run: go test ./...
        env:
          CGO_ENABLED: "0"

      - name: Build
        run: go build -o lokal .
        env:
          CGO_ENABLED: "0"
